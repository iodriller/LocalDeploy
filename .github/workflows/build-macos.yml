name: Build macOS app + DMG

# Manual trigger only, on purpose: this workflow was authored and reasoned
# about from a Windows machine (no Mac available to build or test on
# directly), using the documented PyInstaller BUNDLE() API and macOS's
# built-in hdiutil. It is NOT wired into the release/publish flow yet - run it
# by hand from the Actions tab (or `gh workflow run build-macos.yml`) and
# actually open the resulting .app on a real Mac at least once before trusting
# it, or before adding a `release: published` trigger like publish.yml has.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install packaging dependencies
        run: python -m pip install -e ".[packaging]"

      - name: Stamp the app version into the PyInstaller spec
        run: |
          VERSION=$(python -c "import localdeploy; print(localdeploy.__version__)")
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i '' "s/\"CFBundleShortVersionString\": \"0.0.0\"/\"CFBundleShortVersionString\": \"$VERSION\"/" packaging/macos.spec

      - name: Build LocalDeploy.app
        run: pyinstaller packaging/macos.spec --distpath dist --workpath build --noconfirm

      - name: Smoke test - the bundle exists and launches enough to answer /health
        run: |
          test -d "dist/LocalDeploy.app" || { echo "LocalDeploy.app was not produced"; exit 1; }
          test -x "dist/LocalDeploy.app/Contents/MacOS/LocalDeploy" || { echo "Main executable missing or not executable"; exit 1; }
          API_PORT=8099 NO_BROWSER=1 "dist/LocalDeploy.app/Contents/MacOS/LocalDeploy" &
          APP_PID=$!
          ok=0
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:8099/health" >/dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          kill "$APP_PID" 2>/dev/null || true
          if [ "$ok" != "1" ]; then echo "App did not answer /health within 30s"; exit 1; fi
          echo "Smoke test passed: /health responded."

      - name: Package the DMG
        run: |
          set -euo pipefail
          STAGING="build/dmg-staging"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R "dist/LocalDeploy.app" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "LocalDeploy" -srcfolder "$STAGING" -ov -format UDZO "dist/LocalDeploy-${APP_VERSION}.dmg"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: LocalDeploy-macos-dmg
          path: dist/LocalDeploy-*.dmg

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: LocalDeploy-macos-app
          path: dist/LocalDeploy.app
