name: CI

permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  smoke-windows:
    name: Smoke checks (Windows)
    runs-on: windows-latest

    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run smoke checks
        shell: pwsh
        run: ./scripts/smoke_test.ps1

  tests-linux:
    name: Pytest (Linux, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      # Parse every native ES module without executing browser code.
      - name: Check web UI JavaScript parses
        if: matrix.python-version == '3.12'
        run: for file in localdeploy/web/js/*.js; do node --input-type=module --check < "$file"; done

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint Python
        if: matrix.python-version == '3.12'
        run: python -m ruff check .

      # Install the Chromium build the browser UI smoke tests need. If this step
      # is ever removed, those tests skip cleanly rather than failing.
      - name: Install Playwright browser
        if: matrix.python-version == '3.12'
        run: python -m playwright install --with-deps chromium

      - name: Run pytest
        run: pytest -q
        env:
          CONFIG_PATH: config.example.json
          DEFAULT_MODEL_PROFILE: gemma3_4b_ollama_safe
          REQUIRE_GPU_ONLY: "false"
          ENABLE_LLAMA_CPP: "false"
          ENABLE_CORS: "false"

      # Locks in the no-telemetry guarantee: every local action must stay on
      # loopback with OFFLINE=true, and the one internet-egress action must
      # report itself skipped rather than silently phoning home.
      - name: Run offline egress self-test
        if: matrix.python-version == '3.12'
        run: python scripts/egress_selftest.py

  package:
    name: Build wheel + install smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Inspect wheel web-module inventory
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("dist").glob("*.whl"))
          expected = {"app.js", "shared.js", "system.js", "models.js", "chat.js", "benchmark.js", "benchmark-views.js"}
          with ZipFile(wheel) as archive:
              actual = {Path(name).name for name in archive.namelist() if "/web/js/" in name and name.endswith(".js")}
          assert actual == expected, f"wheel web modules: expected {expected}, got {actual}"
          PY

      - name: Audit runtime dependencies
        run: |
          python -m pip install pip-audit
          python -m pip_audit -r requirements.txt

      - name: Install the wheel and smoke-test the CLI
        run: python -m pip install dist/*.whl && localdeploy --version

      # Run away from the checkout so the import resolves from site-packages,
      # proving the web UI actually ships inside the wheel.
      - name: Verify web assets ship in the wheel
        working-directory: ${{ runner.temp }}
        run: |
          python -c "from localdeploy.utils import web_dir; p = web_dir(); expected = {'app.js', 'shared.js', 'system.js', 'models.js', 'chat.js', 'benchmark.js', 'benchmark-views.js'}; actual = {x.name for x in (p / 'js').glob('*.js')}; assert actual == expected, f'web modules missing: expected {expected}, got {actual}'; print('web assets at', p)"
          python - <<'PY'
          from fastapi.testclient import TestClient
          from api_server import app

          client = TestClient(app)
          modules = ("app", "shared", "system", "models", "chat", "benchmark", "benchmark-views")
          for module in modules:
              response = client.get(f"/ui/js/{module}.js")
              assert response.status_code == 200, (module, response.status_code)
              assert response.headers["content-type"].startswith("text/javascript"), (module, response.headers["content-type"])
          PY
          python -c "from localdeploy.utils import app_home; from pathlib import Path; h = app_home(); assert h == Path.home() / '.localdeploy', f'installed app_home should default to ~/.localdeploy, got {h}'; print('app home:', h)"

  docker-build:
    name: Docker build + boot smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build image
        run: docker build -t localdeploy:ci .

      - name: Start container
        run: docker run -d --name localdeploy-ci -p 8000:8000 localdeploy:ci

      - name: Wait for /health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health; then
              echo
              echo "API is healthy."
              exit 0
            fi
            sleep 2
          done
          echo "API never became healthy within the timeout." >&2
          exit 1

      - name: Container logs
        if: always()
        run: docker logs localdeploy-ci || true

      - name: Stop container
        if: always()
        run: docker rm -f localdeploy-ci || true
