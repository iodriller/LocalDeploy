name: Publish container

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-container-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, publish, and smoke-test GHCR image
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Read package version
        id: package
        shell: bash
        run: echo "version=$(python -c 'import localdeploy; print(localdeploy.__version__)')" >> "$GITHUB_OUTPUT"

      - name: Check the release tag
        if: github.event_name == 'release'
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "${{ steps.package.outputs.version }}" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version ${{ steps.package.outputs.version }}" >&2
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/localdeploy
          flavor: latest=auto
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ steps.package.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and publish
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Smoke-test the published image
        shell: bash
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/localdeploy:${{ steps.meta.outputs.version }}"
          docker run -d --name localdeploy-package-test -p 127.0.0.1:8000:8000 "$IMAGE"
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Published image did not become healthy within 120 seconds." >&2
          exit 1

      - name: Container logs
        if: always()
        run: docker logs localdeploy-package-test || true

      - name: Remove smoke-test container
        if: always()
        run: docker rm -f localdeploy-package-test || true
