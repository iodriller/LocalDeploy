name: Publish to PyPI

permissions:
  contents: read

# Builds and uploads the package when a GitHub release is published.
# Uses PyPI "trusted publishing" (OIDC), so no API token secret is needed.
# The first release needs a pending publisher at
# https://pypi.org/manage/account/publishing/. See docs/RELEASING.md.
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install build
          python -m build

      - name: Check the tag matches the package version
        run: |
          PKG_VERSION=$(python -c "import localdeploy; print(localdeploy.__version__)")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Tag $GITHUB_REF_NAME does not match localdeploy.__version__ ($PKG_VERSION)" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
