name: Publish to PyPI

# Builds and uploads the package when a GitHub release is published.
# Uses PyPI "trusted publishing" (OIDC) — no API token secret needed, but the
# repo must be registered once at https://pypi.org/manage/account/publishing/
# (project: localdeploy, workflow: publish.yml, environment: pypi).
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install build
          python -m build

      - name: Check the tag matches the package version
        run: |
          PKG_VERSION=$(python -c "import localdeploy; print(localdeploy.__version__)")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Tag $GITHUB_REF_NAME does not match localdeploy.__version__ ($PKG_VERSION)" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
