# One-command run:  docker compose up   ->   open http://localhost:8000/ui
#
# This single service bundles Ollama + the LocalDeploy API/UI (they talk over
# localhost inside the container, so the loopback-only backend guard holds).
services:
  localdeploy:
    build: .
    image: localdeploy:latest
    ports:
      # Bound to the host's loopback interface only, matching the loopback-only
      # threat model in SECURITY.md: reachable from this machine, not the LAN.
      # Host port is overridable: API_PORT=8001 docker compose up
      #
      # LAN mode (opt-in): to reach this from other devices on your network,
      # change this to "${API_PORT:-8000}:8000" (binds all host interfaces)
      # AND set API_TOKEN below so the control-plane isn't wide open. See
      # SECURITY.md for what that endpoint surface can do unauthenticated.
      - "127.0.0.1:${API_PORT:-8000}:8000" # API + UI (http://localhost:8000/ui)
    volumes:
      - ollama-models:/root/.ollama # persist pulled models between runs
    environment:
      - API_HOST=0.0.0.0
      - ENABLE_WEB_UI=true
      # Required if you switch the port mapping above to a LAN-reachable bind:
      # - API_TOKEN=change-me
      # Pre-pull models on first boot (space-separated), e.g.:
      # - PULL_MODELS=gemma3:4b
    restart: unless-stopped
    healthcheck:
      # Marks the container healthy only once the API actually answers.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

    # --- NVIDIA GPU passthrough -------------------------------------------
    # Requires the NVIDIA Container Toolkit on the host. Uncomment to use it:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama-models:
